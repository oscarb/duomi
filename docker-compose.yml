version: '3.8'

services:
  duomi:
    build: .
    container_name: duomi
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=/app/data/duomi.db
      - PUBLIC_PERSON_A_NAME=Partner A
      - PUBLIC_PERSON_B_NAME=Partner B
