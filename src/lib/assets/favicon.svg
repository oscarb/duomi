<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <clipPath id="topClip">
      <rect x="0" y="0" width="512" height="246" />
    </clipPath>
    <clipPath id="bottomClip">
      <rect x="0" y="266" width="512" height="246" />
    </clipPath>
  </defs>
  <!-- Group rotated by -45 degrees around the center (256, 256) -->
  <g transform="rotate(-45 256 256)">
    <!-- Top-Left Segment (Coral) -->
    <g clip-path="url(#topClip)">
      <circle cx="256" cy="256" r="200" fill="#ff8373" />
      <circle cx="256" cy="256" r="160" fill="#f25c4c" />
    </g>
    
    <!-- Bottom-Right Segment (Teal) -->
    <g clip-path="url(#bottomClip)">
      <circle cx="256" cy="256" r="200" fill="#5ccdbd" />
      <circle cx="256" cy="256" r="160" fill="#39b4a4" />
    </g>
  </g>
</svg>